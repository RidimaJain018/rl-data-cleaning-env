# OpenEnv Environment Specification
# ===================================
# RL Data Cleaning Agent — v2.0.0
# Multi-domain tabular data cleaning across HR, Finance, Medical, Ecommerce.
# 7 issue types: missing · outlier · invalid_negative · invalid_range
#                duplicate · type_mismatch · whitespace_padding

name: rl-data-cleaning-env
description: >
  A reinforcement-learning environment for tabular data cleaning across four
  real-world domains: HR employee records, financial transactions, medical
  patient records, and ecommerce orders. The agent inspects one problematic
  row per step and chooses an action (skip / impute_missing / flag_for_review /
  fix_outlier) to iteratively clean a dirty DataFrame. Three difficulty levels
  control which domains are active and how many issue types appear — the agent
  must generalise across schemas without being told which domain it is operating on.
version: "2.0.0"
tags:
  - data-cleaning
  - tabular
  - multi-domain
  - openenv-hackathon
  - reinforcement-learning

# ---------------------------------------------------------------------------
# Server configuration
# ---------------------------------------------------------------------------
server:
  module: app
  app: main
  host: "0.0.0.0"
  port: 8000

# ---------------------------------------------------------------------------
# Required environment variables (hackathon spec)
# ---------------------------------------------------------------------------
env_variables:
  API_BASE_URL:
    description: Base URL for the OpenAI-compatible LLM API endpoint.
    example: "https://api-inference.huggingface.co/v1"
    required: true
  MODEL_NAME:
    description: Model identifier passed to the LLM API.
    example: "meta-llama/Llama-3.2-3B-Instruct"
    required: true
  HF_TOKEN:
    description: Hugging Face API token used as the API key.
    example: "hf_..."
    required: true
  AGENT_TYPE:
    description: Agent to run in inference.py — "baseline" or "llm".
    default: "baseline"
    required: false

# ---------------------------------------------------------------------------
# Endpoints (OpenEnv 3-method interface: reset / step / state)
# ---------------------------------------------------------------------------
endpoints:
  reset:
    method: POST
    path: /reset
    description: >
      Start a new episode for the given task level.
      Samples a domain (HR / Finance / Medical / Ecommerce) based on difficulty,
      generates a dirty DataFrame, and returns the first observation.
    request:
      content_type: application/json
      schema:
        type: object
        properties:
          task_level:
            type: string
            enum: [easy, medium, hard]
            default: medium
        required: []
    response:
      content_type: application/json
      schema:
        type: object
        properties:
          observation:
            oneOf:
              - $ref: "#/models/ObservationModel"
              - type: "null"

  step:
    method: POST
    path: /step
    description: >
      Apply one action to the current issue row.
      Returns the next observation, reward signal, done flag, and step count.
    request:
      content_type: application/json
      schema:
        $ref: "#/models/ActionModel"
    response:
      content_type: application/json
      schema:
        $ref: "#/models/StepResultModel"

  state:
    method: GET
    path: /state
    description: >
      Return a full snapshot of the current episode state without advancing it.
      Includes task level, active domain, step counts, score, remaining issues,
      and full episode log.
    response:
      content_type: application/json
      schema:
        $ref: "#/models/EnvStateModel"

  run:
    method: POST
    path: /run
    description: >
      Run a complete episode from start to finish using the baseline agent
      and return the final EnvStateModel. Useful for smoke tests and automated
      evaluation pipelines.
    request:
      content_type: application/json
      schema:
        type: object
        properties:
          task_level:
            type: string
            enum: [easy, medium, hard]
            default: medium
          agent:
            type: string
            enum: [baseline]
            default: baseline
    response:
      content_type: application/json
      schema:
        $ref: "#/models/EnvStateModel"

  upload:
    method: POST
    path: /upload
    description: >
      Upload any CSV file to start a cleaning episode.
      Auto-detects numeric vs categorical columns and applies IQR-based outlier
      detection — works with any column names, any domain, any row count.
    request:
      content_type: multipart/form-data
      body:
        file: CSV file (binary upload)
    response:
      content_type: application/json
      schema:
        type: object
        properties:
          observation:
            oneOf:
              - $ref: "#/models/ObservationModel"
              - type: "null"
          total_issues:
            type: integer
          rows:
            type: integer
          columns:
            type: array
            items:
              type: string

  evaluate_upload:
    method: POST
    path: /evaluate_upload
    description: >
      Upload any CSV and run a full cleaning episode with the trained Q-policy
      (falls back to baseline if policy.pkl not present). Returns score, steps,
      and full episode log. Evaluates the trained agent on genuinely unseen data.
    request:
      content_type: multipart/form-data
      body:
        file: CSV file (binary upload)
    response:
      content_type: application/json

  health:
    method: GET
    path: /health
    description: 'Liveness probe — returns {"status": "ok"}.'
    response:
      content_type: application/json

# ---------------------------------------------------------------------------
# Pydantic model references
# ---------------------------------------------------------------------------
models:
  module: models
  ObservationModel:     ObservationModel
  ActionModel:          ActionModel
  RewardModel:          RewardModel
  StepResultModel:      StepResultModel
  EpisodeLogEntryModel: EpisodeLogEntryModel
  EnvStateModel:        EnvStateModel

# ---------------------------------------------------------------------------
# Action space
# ---------------------------------------------------------------------------
action_space:
  type: discrete
  n: 4
  actions:
    - id: 0
      label: skip
      description: >
        Do nothing; move to the next issue without modifying the data.
        Correct when the row has no detectable issue.
    - id: 1
      label: impute_missing
      description: >
        Fill a NaN / missing (null) cell with the column mean (numeric columns)
        or the column mode (categorical columns).
        Correct for issue type: missing.
    - id: 2
      label: flag_for_review
      description: >
        Mark the row as suspicious without fixing it. Gives a small negative
        reward (-0.5) — better than a wrong fix (-1) but worse than correct fix (+2).
        Useful for genuinely ambiguous rows. Does not advance the fix count.
    - id: 3
      label: fix_outlier
      description: >
        Replace an invalid, corrupt, or out-of-range value with the column mean.
        Also handles: duplicate rows (drops the row), type mismatches (coerces
        to numeric then imputes), and whitespace padding (strips the string).
        Correct for issue types: outlier, invalid_negative, invalid_range,
        duplicate, type_mismatch, whitespace_padding.

# ---------------------------------------------------------------------------
# Observation space  (multi-domain — fields vary by active domain)
# ---------------------------------------------------------------------------
observation_space:
  type: dict
  description: >
    A single dirty row from the active domain's DataFrame, presented as raw
    key-value pairs. The domain name and issue type label are NEVER included.
    The agent must infer what is wrong from:
      row_data      — raw cell values (may contain None, strings, numeric outliers)
      column_stats  — per-column mean and std, enabling z-score reasoning
      step_progress — fraction of max_steps consumed (0.0–1.0)
      issues_remaining — how many issues are still unfixed
  domains:
    hr:
      columns: [employee_id, age, salary, department, job_title, city,
                experience, years_at_company, performance_score, bonus,
                overtime_hours, rating]
      numeric: [age, salary, experience, years_at_company, performance_score,
                bonus, overtime_hours, rating]
    finance:
      columns: [transaction_id, account_id, amount, balance, credit_limit,
                transaction_fee, merchant, category, status, country]
      numeric: [amount, balance, credit_limit, transaction_fee]
    medical:
      columns: [patient_id, age_years, systolic_bp, diastolic_bp, heart_rate,
                glucose_level, bmi, dosage_mg, lab_value, diagnosis,
                medication, blood_type]
      numeric: [age_years, systolic_bp, diastolic_bp, heart_rate,
                glucose_level, bmi, dosage_mg, lab_value]
    ecommerce:
      columns: [order_id, sku, price, quantity, discount_pct, shipping_days,
                review_score, return_rate, units_sold, category, carrier, status]
      numeric: [price, quantity, discount_pct, shipping_days, review_score,
                return_rate, units_sold]

# ---------------------------------------------------------------------------
# Issue types
# ---------------------------------------------------------------------------
issue_types:
  - id: missing
    description: "A cell contains NaN or null. Correct action: 1 (impute_missing)."
  - id: outlier
    description: "Numeric value far outside the column distribution (IQR-based). Correct action: 3 (fix_outlier)."
  - id: invalid_negative
    description: "A negative value in a column whose valid range is non-negative. Correct action: 3 (fix_outlier)."
  - id: invalid_range
    description: "A value that violates the domain-specific valid range (e.g. discount > 100%, review > 5.0). Correct action: 3 (fix_outlier)."
  - id: duplicate
    description: "An exact duplicate of a previously seen row (row is dropped). Correct action: 3 (fix_outlier)."
  - id: type_mismatch
    description: "A non-parseable string in an expected-numeric column (e.g. 'N/A', 'unknown'). Correct action: 3 (fix_outlier)."
  - id: whitespace_padding
    description: "A string column value has leading or trailing whitespace. Correct action: 3 (fix_outlier)."

# ---------------------------------------------------------------------------
# Task descriptions
# ---------------------------------------------------------------------------
tasks:
  easy:
    rows: 40
    issues: 12
    domains_active: [hr]
    issue_types_present: [missing, outlier, invalid_negative]
    description: >
      40-row HR employee dataset. Single domain — the agent learns the core
      skip / impute_missing / fix_outlier distinction on familiar employee data
      (salary, age, bonus, performance_score, etc.) before encountering new domains.
      Seed: 123.

  medium:
    rows: 80
    issues: 20
    domains_active: [hr, finance]
    issue_types_present: [missing, outlier, invalid_negative, type_mismatch, whitespace_padding]
    description: >
      80-row mixed dataset drawn from HR and Finance domains. The agent must
      generalise its cleaning policy to financial transaction records
      (amount, balance, credit_limit, transaction_fee) with different column
      names and value distributions than HR data. Adds type_mismatch and
      whitespace_padding issue types. Seed: 999.

  hard:
    rows: 120
    issues: 30
    domains_active: [hr, finance, medical, ecommerce]
    issue_types_present:
      - missing
      - outlier
      - invalid_negative
      - invalid_range
      - duplicate
      - type_mismatch
      - whitespace_padding
    description: >
      120-row dataset mixing all four domains. The agent must handle medical
      patient records (blood pressure, glucose, BMI) and ecommerce orders
      (price, quantity, discount, review_score) alongside HR and Finance.
      All 7 issue types are present. The agent cannot rely on column names —
      it must generalise purely from z-score signals and null/string flags.
      Seed: 1337.

# ---------------------------------------------------------------------------
# Reward structure
# ---------------------------------------------------------------------------
reward:
  correct_fix:              +2
  wrong_action:             -1
  flag_for_review:          -0.5
  episode_completion_bonus: +5
  timeout_penalty:          -5
  score_formula:            "fixed_issues / total_issues_at_start  →  float in [0.0, 1.0]"

  design_rationale: >
    The reward structure produces dense, meaningful learning signals at every
    step — not just terminal rewards.

    correct_fix (+2): Per-step positive reward for every successful fix ensures
    immediate feedback proportional to progress. Avoids the sparse-reward problem.

    wrong_action (-1): Small penalty for incorrect actions discourages random
    selection without making early mistakes catastrophic. The +2/-1 asymmetry
    encourages exploration during training.

    flag_for_review (-0.5): A lighter penalty than wrong_action, encouraging
    the agent to flag genuinely ambiguous rows rather than guessing wrong.
    Better than a wrong fix, but the agent is incentivised to actually fix
    issues it can identify rather than flagging everything.

    episode_completion_bonus (+5): Terminal bonus for resolving all issues
    rewards thoroughness — an agent that fixes 29/30 issues scores meaningfully
    lower than one that fixes all 30.

    timeout_penalty (-5): Prevents a degenerate policy of cycling through rows
    without committing to fixes.

    score_formula: Partial-credit score (fixed/total) is normalised [0.0, 1.0]
    and comparable across episodes, domains, and difficulty levels.

  partial_progress_signals:
    - Per-step reward on every correct fix (not just episode end)
    - Score updates after each correct action (visible via /state)
    - Episode log records per-step correctness and domain context
    - Remaining issues count decrements after each correct fix

# ---------------------------------------------------------------------------
# Baseline scores (deterministic — seeded datasets, rule-based agent)
# ---------------------------------------------------------------------------
baseline_scores:
  easy:   { score: 0.990, steps: 12, fixed: "12/12", domain: "hr" }
  medium: { score: 0.990, steps: 20, fixed: "20/20", domain: "finance" }
  hard:   { score: 0.966, steps: 30, fixed: "29/30", domain: "medical" }

# ---------------------------------------------------------------------------
# Trained Q-policy scores (policy.pkl — 10500 training episodes)
# ---------------------------------------------------------------------------
trained_agent_scores:
  easy:   { avg_score: 0.990, policy_states: 48 }
  medium: { avg_score: 0.990, policy_states: 48 }
  hard:   { avg_score: 0.966, policy_states: 48 }
  note: >
    Policy is domain-agnostic — state keys are built from (null-flags,
    z-score buckets, whitespace-flags) per column, not column names.
    Novel domain states fall through to the LLM/baseline agent.
